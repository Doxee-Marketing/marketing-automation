# Configurazione Deal Engagement Extractor

# ID del segmento HubSpot "Deal Created in 2026 – New Logo/Cross-Sell"
list_id: 17603

# Nome della property di lead score in HubSpot.
# - "hubspotscore" è quella standard di HubSpot.
# - Se Doxee usa un custom score (es. "doxee_lead_score"), cambialo qui.
score_property: lead_score_contacts_total

# Soglia minima per includere un contatto.
# - null  → include tutti i contatti CON uno score (esclude solo quelli non scorati). Replica il file template.
# - 1     → esclude anche gli zero
# - 10    → solo "High engagement" secondo la legenda
score_threshold: null

# Directory output (.xlsx) e cache (.json)
output_dir: ./output
cache_dir: ./data/cache
